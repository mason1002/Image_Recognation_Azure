<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="860" viewBox="0 0 1600 860" role="img" aria-labelledby="title desc">
  <title id="title">智能视觉检测云端解决方案 Azure Architecture</title>
  <desc id="desc">Edge Robot uploads shelf images through Azure IoT Hub to Blob Storage. Blob events trigger Azure Functions, which invoke Azure Machine Learning and store JSON results in Cosmos DB. Results are then queried through API Management to Power BI and business systems.</desc>
  <defs>
    <style>
      .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .section { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .section-sub { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .label { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
      .small { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #374151; }
      .step { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .legend { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #374151; }
      .arrow { stroke: #2f2f2f; stroke-width: 3.5; fill: none; marker-end: url(#arrow); }
      .callback { stroke: #0ea5e9; stroke-width: 3; fill: none; stroke-dasharray: 10 8; marker-end: url(#arrowBlue); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#2f2f2f"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#0ea5e9"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect x="10" y="10" width="1460" height="54" rx="0" fill="#002050"/>
  <text x="28" y="45" class="title">智能视觉检测云端解决方案 — Azure Architecture</text>

  <rect x="10" y="84" width="155" height="620" fill="#f5f5f5" stroke="#b9b9b9"/>
  <rect x="175" y="84" width="300" height="620" fill="#dae8fc" stroke="#7da7d9"/>
  <rect x="485" y="84" width="430" height="620" fill="#d9ead3" stroke="#8db070"/>
  <rect x="925" y="84" width="225" height="620" fill="#fff2cc" stroke="#e2bf52"/>
  <rect x="1160" y="84" width="410" height="620" fill="#e6d9f2" stroke="#a78ac4"/>

  <text x="88" y="675" text-anchor="middle" class="section">边缘端</text>
  <text x="88" y="703" text-anchor="middle" class="section-sub">Edge</text>
  <text x="325" y="675" text-anchor="middle" class="section">数据接入</text>
  <text x="325" y="703" text-anchor="middle" class="section-sub">Ingest</text>
  <text x="700" y="675" text-anchor="middle" class="section">AI 推理管道</text>
  <text x="700" y="703" text-anchor="middle" class="section-sub">Inference Pipeline</text>
  <text x="1037" y="675" text-anchor="middle" class="section">结果存储</text>
  <text x="1037" y="703" text-anchor="middle" class="section-sub">Store</text>
  <text x="1365" y="675" text-anchor="middle" class="section">回传/可视化</text>
  <text x="1365" y="703" text-anchor="middle" class="section-sub">Output</text>

  <g filter="url(#shadow)">
    <rect x="47" y="300" width="80" height="80" rx="16" fill="#ecfeff" stroke="#67c4de"/>
    <circle cx="87" cy="338" r="19" fill="#38bdf8"/>
    <rect x="82" y="338" width="10" height="28" rx="5" fill="#ffffff"/>
  </g>
  <text x="87" y="402" text-anchor="middle" class="label">巡检机器人</text>
  <text x="87" y="425" text-anchor="middle" class="small">Edge Robot</text>

  <g filter="url(#shadow)">
    <rect x="214" y="300" width="80" height="80" rx="16" fill="#eef6ff" stroke="#79a8da"/>
    <circle cx="244" cy="340" r="8" fill="#41c2e8"/>
    <circle cx="268" cy="328" r="8" fill="#8e8e8e"/>
    <circle cx="268" cy="352" r="8" fill="#8e8e8e"/>
    <path d="M252 338 L260 332 M252 342 L260 348" stroke="#8e8e8e" stroke-width="5"/>
  </g>
  <text x="254" y="402" text-anchor="middle" class="label">Azure IoT Hub</text>
  <text x="254" y="425" text-anchor="middle" class="small">设备安全接入</text>

  <g filter="url(#shadow)">
    <rect x="383" y="300" width="80" height="80" rx="16" fill="#eff8ff" stroke="#6cb4d8"/>
    <rect x="392" y="316" width="62" height="42" rx="6" fill="#0ea5e9"/>
    <rect x="392" y="316" width="62" height="12" fill="#1d4ed8"/>
    <path d="M399 322 h14" stroke="#ffffff" stroke-width="3"/>
  </g>
  <text x="423" y="402" text-anchor="middle" class="label">Azure Blob Storage</text>
  <text x="423" y="425" text-anchor="middle" class="small">原始图片存储</text>

  <g filter="url(#shadow)">
    <rect x="574" y="300" width="80" height="80" rx="16" fill="#f0fbf4" stroke="#7fb36e"/>
    <path d="M589 322 h50 v10 h-50 z M589 348 h50 v10 h-50 z" fill="#9ca3af"/>
    <path d="M621 327 l8 8 -8 8 M607 349 l-8 -8 8 -8" stroke="#22c55e" stroke-width="5" fill="none"/>
  </g>
  <text x="614" y="402" text-anchor="middle" class="label">Azure Event Grid</text>
  <text x="614" y="425" text-anchor="middle" class="small">Blob 事件触发</text>

  <g filter="url(#shadow)">
    <rect x="718" y="300" width="80" height="80" rx="16" fill="#eef9ff" stroke="#73a9cf"/>
    <path d="M746 316 l-16 30 h16 l-7 18 29 -35 h-15 l9 -13 z" fill="#f59e0b"/>
    <path d="M775 316 l16 17 -8 8 8 9 -16 17" stroke="#38bdf8" stroke-width="5" fill="none"/>
  </g>
  <text x="758" y="402" text-anchor="middle" class="label">Azure Functions</text>
  <text x="758" y="425" text-anchor="middle" class="small">无服务器编排</text>

  <g filter="url(#shadow)">
    <rect x="718" y="468" width="80" height="80" rx="16" fill="#eefcff" stroke="#74bcc7"/>
    <path d="M758 480 l-24 52 h48 z" fill="#38bdf8" opacity="0.95"/>
    <rect x="746" y="500" width="24" height="22" fill="#ffffff" opacity="0.9"/>
  </g>
  <text x="758" y="570" text-anchor="middle" class="label">Azure Machine Learning</text>
  <text x="758" y="593" text-anchor="middle" class="small">模型训练 &amp; 推理端点</text>

  <g filter="url(#shadow)">
    <rect x="992" y="318" width="80" height="80" rx="16" fill="#fffaf0" stroke="#cfb45c"/>
    <circle cx="1032" cy="348" r="22" fill="#2563eb" opacity="0.9"/>
    <path d="M1017 348 a15 15 0 0 0 30 0 a15 15 0 0 0 -30 0" fill="none" stroke="#ffffff" stroke-width="3"/>
    <path d="M1032 326 a22 22 0 0 1 0 44 a22 22 0 0 1 0 -44" fill="none" stroke="#7dd3fc" stroke-width="3"/>
  </g>
  <text x="1032" y="420" text-anchor="middle" class="label">Azure Cosmos DB</text>
  <text x="1032" y="443" text-anchor="middle" class="small">推理结果存储（JSON）</text>

  <g filter="url(#shadow)">
    <rect x="1260" y="318" width="80" height="80" rx="16" fill="#f7f2fb" stroke="#a58dc0"/>
    <circle cx="1300" cy="348" r="22" fill="#38bdf8" opacity="0.95"/>
    <circle cx="1308" cy="356" r="12" fill="#8b5cf6" opacity="0.95"/>
    <circle cx="1292" cy="340" r="8" fill="#f0abfc"/>
  </g>
  <text x="1300" y="420" text-anchor="middle" class="label">Azure API Management</text>
  <text x="1300" y="443" text-anchor="middle" class="small">REST 回传接口</text>

  <g filter="url(#shadow)">
    <rect x="1484" y="205" width="58" height="78" rx="12" fill="#fff8e6" stroke="#d4b04a"/>
    <rect x="1501" y="244" width="10" height="22" fill="#fde047"/>
    <rect x="1514" y="228" width="10" height="38" fill="#facc15"/>
    <rect x="1527" y="208" width="10" height="58" fill="#eab308"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="1456" y="488" width="80" height="80" rx="16" fill="#f3f8ff" stroke="#8da4d8"/>
    <circle cx="1496" cy="528" r="23" fill="#60a5fa"/>
    <circle cx="1496" cy="528" r="9" fill="#dbeafe"/>
    <path d="M1478 528 h36 M1496 510 v36" stroke="#dbeafe" stroke-width="3" opacity="0.9"/>
  </g>
  <text x="1496" y="590" text-anchor="middle" class="label">业务系统</text>
  <text x="1496" y="613" text-anchor="middle" class="small">WMS / ERP / App</text>

  <path class="arrow" d="M127 340 H214"/>
  <text x="171" y="327" text-anchor="middle" class="small">MQTT / HTTPS</text>

  <path class="arrow" d="M294 340 H383"/>
  <text x="338" y="327" text-anchor="middle" class="small">Upload Image</text>

  <path class="arrow" d="M463 340 H574"/>
  <text x="518" y="327" text-anchor="middle" class="small">Blob Created</text>

  <path class="arrow" d="M654 340 H718"/>
  <text x="686" y="327" text-anchor="middle" class="small">Trigger</text>

  <path class="arrow" d="M758 380 V468"/>
  <text x="675" y="455" class="small">Invoke Endpoint</text>

  <path class="arrow" d="M798 508 H992"/>
  <text x="895" y="495" text-anchor="middle" class="small">JSON Result</text>

  <path class="arrow" d="M1072 358 H1260"/>
  <text x="1166" y="345" text-anchor="middle" class="small">Query Results</text>

  <path class="arrow" d="M1340 348 H1484"/>
  <text x="1412" y="335" text-anchor="middle" class="small">Dashboard Data</text>

  <path class="arrow" d="M1330 372 L1456 520"/>
  <text x="1405" y="458" text-anchor="middle" class="small">Results API</text>

  <path class="callback" d="M1300 398 V610 H88 V380"/>
  <text x="700" y="602" text-anchor="middle" class="small" fill="#0ea5e9">推理结果回传 Result Callback</text>

  <g>
    <circle cx="156" cy="292" r="18" fill="#00b050"/><text x="156" y="298" text-anchor="middle" class="step">1</text>
    <circle cx="339" cy="292" r="18" fill="#00b050"/><text x="339" y="298" text-anchor="middle" class="step">2</text>
    <circle cx="486" cy="292" r="18" fill="#00b050"/><text x="486" y="298" text-anchor="middle" class="step">3</text>
    <circle cx="668" cy="288" r="18" fill="#00b050"/><text x="668" y="294" text-anchor="middle" class="step">4</text>
    <circle cx="636" cy="427" r="18" fill="#00b050"/><text x="636" y="433" text-anchor="middle" class="step">5</text>
    <circle cx="914" cy="508" r="18" fill="#00b050"/><text x="914" y="514" text-anchor="middle" class="step">6</text>
    <circle cx="1115" cy="345" r="18" fill="#00b050"/><text x="1115" y="351" text-anchor="middle" class="step">7</text>
    <circle cx="1326" cy="284" r="18" fill="#00b050"/><text x="1326" y="290" text-anchor="middle" class="step">8</text>
  </g>

  <rect x="12" y="720" width="500" height="76" rx="12" fill="#ffffff" stroke="#b8b8b8"/>
  <text x="30" y="753" class="legend">• 实线箭头 = 主数据流 (Main Data Flow)</text>
  <text x="30" y="781" class="legend">• 虚线箭头 = 可选/回传 (Optional / Callback)</text>

  <text x="1470" y="820" text-anchor="end" class="small" fill="#6b7280">Microsoft Azure | 智能视觉检测云端解决方案 | April 2026</text>
</svg>
